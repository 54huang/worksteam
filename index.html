<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self';">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
  <title>个人简介</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <main class="profile-card">
      <img
        class="profile-card__avatar"
        src="avatar.jpg"
        alt="个人头像"
      >
      <div class="profile-card__info">
        <h1 class="profile-card__name">张三</h1>
        <p class="profile-card__bio">一名热爱前端开发的软件工程师，专注于构建优雅、高性能的 Web 应用。喜欢开源，持续学习。</p>
      </div>
      <div class="profile-card__contact">
        <span
          class="profile-card__email"
          data-copy="zhangsan@example.com"
          tabindex="0"
          role="button"
          aria-label="点击复制邮箱地址"
        >zhangsan@example.com</span>
        <a
          class="profile-card__github"
          href="https://github.com/zhangsan"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="访问 GitHub 主页"
        >
          <svg class="profile-card__github-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </a>
      </div>
    </main>
  </div>
  <script src="main.js"></script>
</body>
</html>
